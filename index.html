<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name - Portfolio</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #fff;
        }

        h1, h2, h3 {
            color: #111;
            font-weight: 600;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }

        h2 {
            font-size: 1.3rem;
            margin-top: 40px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        p {
            margin: 15px 0;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .links {
            margin: 10px 0 30px 0;
            font-size: 0.95rem;
        }

        .links a::after {
            content: " / ";
            color: #888;
        }

        .links a:last-child::after {
            content: "";
        }

        .blog-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 12px;
        }

        .blog-title {
            font-weight: 500;
        }

        .blog-date {
            color: #666;
            font-size: 0.9rem;
            white-space: nowrap;
            margin-left: 20px;
        }

</head>

    <header>
        <h1>Arhan Nagavelli</h1>
        <div class="links">

    <main>

        </section>
        </section>
